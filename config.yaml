# =============================================================================
# Player Number-Guided AI Highlight Video Curator
# Master configuration — all stages read from this file.
# =============================================================================

# ---------------------------------------------------------------------------
# Stage 1 — Player Detector (YOLOv8m)
# ---------------------------------------------------------------------------
detector:
  model_path: "models/yolov8m_players.pt"   # fine-tuned weights (after training)
  pretrained_model: "yolov8m.pt"            # ultralytics hub fallback
  conf_threshold: 0.30
  iou_threshold: 0.45
  player_class_id: 0                        # COCO 'person' or SoccerNet 'player'
  input_size: 640                           # inference resolution

# ---------------------------------------------------------------------------
# Stage 2 — Jersey Number Reader (two-digit CNN)
# ---------------------------------------------------------------------------
jersey_reader:
  model_path: "models/jersey_cnn.pt"
  backbone: "resnet18"
  num_classes: 100                          # digit pairs 00–99
  input_size: [64, 128]                     # [width, height] of player crop
  conf_threshold: 0.70                      # min softmax confidence to trust a read
  color_hint: null                          # "dark" | "light" | null — filter crops by jersey colour
  orientation_filter:
    enabled: true
    # Pose keypoint indices (COCO): left-shoulder=5, right-shoulder=6,
    # left-hip=11, right-hip=12  — used to estimate body facing direction.
    shoulder_indices: [5, 6]
    hip_indices: [11, 12]
    # Fraction of crop width: if |shoulder_midpoint_x - crop_center_x| / crop_w
    # exceeds this, the player is likely back-facing → skip jersey read.
    facing_threshold: 0.35

# ---------------------------------------------------------------------------
# Stage 3 — Player Tracker (ByteTrack + jersey identity anchoring)
# ---------------------------------------------------------------------------
tracker:
  track_activation_threshold: 0.25         # ByteTrack detection score gate
  lost_track_buffer: 30                     # frames to keep a lost track alive
  minimum_matching_threshold: 0.80         # IoU / appearance matching threshold
  frame_rate: 30
  # Jersey identity settings
  jersey_reid_weight: 0.90                 # confidence in jersey read vs. appearance
  jersey_vote_window: 10                   # frames to majority-vote jersey number
  jersey_min_votes: 3                      # min positive reads to anchor an ID

# ---------------------------------------------------------------------------
# Stage 4 — Highlight Scorer (ResNet-50 + LSTM)
# ---------------------------------------------------------------------------
scorer:
  model_path: "models/scorer_lstm.pt"
  backbone: "resnet50"
  feature_dim: 2048                         # ResNet-50 global-avg-pool output
  hidden_dim: 512
  num_layers: 2
  dropout: 0.30
  clip_length_frames: 90                    # 3 s at 30 fps — one LSTM sequence
  clip_stride_frames: 15                    # overlap between scoring windows
  highlight_threshold: 0.60                 # score ≥ this → include in reel
  # Score bonuses (added before threshold comparison)
  ball_proximity_boost: 0.10               # target player near ball
  attacking_third_boost: 0.15             # action in opponent's third of pitch

# ---------------------------------------------------------------------------
# Video assembly (FFmpeg)
# ---------------------------------------------------------------------------
video:
  output_dir: "outputs"
  temp_dir: "outputs/temp_clips"
  source_fps: 30
  output_fps: 30
  pre_roll_frames: 30                       # 1 s before highlight event
  post_roll_frames: 60                      # 2 s after highlight event
  min_clip_gap_frames: 30                   # merge clips separated by < 1 s
  ffmpeg_crf: 23                            # output quality (lower = better)
  ffmpeg_preset: "fast"

# ---------------------------------------------------------------------------
# Training — Stage 1: YOLOv8m fine-tuning
# ---------------------------------------------------------------------------
training:
  yolo:
    data_yaml: "data/soccernet_detection/dataset.yaml"
    model: "yolov8m.pt"
    epochs: 50
    imgsz: 640
    batch_size: 16
    lr0: 0.01
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005
    warmup_epochs: 3
    device: null                            # null → auto-detect
    workers: 8
    project: "logs/yolo"
    name: "player_detection"
    # Quick-test overrides (python run_training.py --quick-test)
    quick_test_epochs: 2
    quick_test_batch_size: 4
    quick_test_imgsz: 320

  # Training — Stage 2: Two-digit jersey CNN
  jersey_cnn:
    data_dir: "data/soccernet_jersey"
    backbone: "resnet18"
    num_classes: 100
    input_size: [64, 128]
    epochs: 30
    batch_size: 64
    lr: 0.001
    weight_decay: 0.0001
    lr_scheduler: "cosine"                  # cosine annealing
    val_split: 0.15
    num_workers: 4
    # Augmentations
    augment:
      random_crop: true
      color_jitter: true
      horizontal_flip: true
      gaussian_noise: true
    log_dir: "logs/jersey_cnn"
    save_path: "models/jersey_cnn.pt"
    # Quick-test overrides
    quick_test_epochs: 2
    quick_test_samples: 500
    quick_test_batch_size: 16

  # Training — Stage 4: ResNet-50 + LSTM scorer
  scorer_lstm:
    data_dir: "data/soccernet_actions"
    backbone: "resnet50"
    feature_dim: 2048
    hidden_dim: 512
    num_layers: 2
    dropout: 0.30
    clip_length_frames: 90
    epochs: 20
    batch_size: 16
    lr: 0.0001
    weight_decay: 0.00001
    num_workers: 4
    log_dir: "logs/scorer_lstm"
    save_path: "models/scorer_lstm.pt"
    # Quick-test overrides
    quick_test_epochs: 2
    quick_test_clips: 20
    quick_test_batch_size: 1          # 1 clip at a time to stay within MPS RAM
    quick_test_clip_length: 16        # shorten sequences to 16 frames (vs 90)

# ---------------------------------------------------------------------------
# Shared paths
# ---------------------------------------------------------------------------
paths:
  models_dir: "models"
  data_dir: "data"
  outputs_dir: "outputs"
  logs_dir: "logs"
